# Netlify configuration for the DermaSynergy monorepo.
# Installs the whole workspace at the repo root, then builds only the web app
# (Turborepo handles the task graph + caching). Works for CLI and git-connected builds.

[build]
  command = "npx turbo run build --filter=@dermasynergy/web"
  publish = "apps/web/public"

[build.environment]
  # Pin a Gatsby-supported LTS Node so Netlify builds match local.
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit --no-fund"

# Long-cache the fingerprinted Gatsby assets.
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Gatsby emits 404.html; Netlify serves it automatically for unknown routes.
